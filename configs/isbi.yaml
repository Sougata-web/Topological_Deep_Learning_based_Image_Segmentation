project:
  name: topological_isbi_segmentation
  output_dir: outputs
  seed: 42

data:
  image_tif: data/raw/isbi/train-volume.tif
  label_tif: data/raw/isbi/train-labels.tif
  split_file: data/splits/isbi_split.json
  processed_dir: data/processed/isbi
  patch_size: 128
  train_patches_per_epoch: 1200
  validation_patches_per_epoch: 240
  foreground_sampling_probability: 0.70
  num_workers: 2
  validation_fraction: 0.20
  test_fraction: 0.20

model:
  in_channels: 1
  out_channels: 1
  base_channels: 24

training:
  epochs: 60
  batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 0.001
  weight_decay: 0.00001
  threshold: 0.5
  amp: true
  deterministic: false
  early_stopping_patience: 12
  topology_warmup_epochs: 5

loss:
  bce_weight: 0.5
  dice_weight: 0.5
  topology_weight: 0.01

ph:
  patch_size: 64
  max_patches_per_batch: 2
  dimensions: [0, 1]

dect:
  num_directions: 16
  num_heights: 32
  direction_chunk_size: 4
  sigmoid_steepness: 25.0
  patch_size: 64
  max_patches_per_batch: 2
  include_background: true

evaluation:
  topology_patch_size: 64
  topology_stride: 64
  save_predictions: true

benchmark:
  warmup_iterations: 5
  iterations: 30

topology:
  patch_size: 64
  maximum_patches: 4